name: E2E Smoke Tests

# ⚠ 활성화 전 GitHub Secrets에 다음 두 값 등록 필요:
#    E2E_LOGIN_ID, E2E_PASSWORD
#    (E2E_BASE_URL은 운영 URL을 그대로 쓸 거면 secret 또는 vars로,
#     로컬 빌드를 띄워 테스트하려면 변수 비우면 webServer가 npm run dev 기동)
#
# 이 워크플로우는 push에 즉시 반응하지 않습니다 — workflow_dispatch (수동) +
# main 브랜치 push 시에만 동작. PR마다 돌리려면 pull_request 트리거 추가.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          CI: 'true'
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_LOGIN_ID: ${{ secrets.E2E_LOGIN_ID }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
