name: Scheduled Batches

# 경옥채 정기 배치 작업 (GitHub Actions 무료 크론)
#
# 필요한 Repository Secrets (Settings → Secrets and variables → Actions):
#   - APP_URL     : 배포된 URL (예: https://e-scm-kyo.vercel.app)
#   - CRON_SECRET : 배치 엔드포인트 보호용 Bearer 토큰 (Vercel 환경변수와 동일)
#
# ⚠ Secrets 미설정 시 각 job이 skip 처리되어 실패 메일이 발송되지 않습니다.

on:
  schedule:
    - cron: '0 23 * * *'   # 카페24 동기화 08:00 KST
    - cron: '0 9 * * *'    # 카페24 동기화 18:00 KST
    - cron: '0 0 * * *'    # 생일 알림톡 09:00 KST
    - cron: '0 1 * * 1'    # 휴면 재유치 월 10:00 KST
    - cron: '0 17 * * *'   # 카페24 토큰 갱신 02:00 KST
    - cron: '*/10 * * * *' # 캠페인 예약 발송 10분 간격
  workflow_dispatch:
    inputs:
      job:
        description: '수동 실행할 배치'
        required: true
        default: 'cafe24-sync'
        type: choice
        options:
          - cafe24-sync
          - birthday
          - dormant
          - cafe24-refresh
          - campaign-scheduler

jobs:
  cafe24-sync:
    if: >-
      github.event_name == 'schedule' && (github.event.schedule == '0 23 * * *' || github.event.schedule == '0 9 * * *') ||
      github.event_name == 'workflow_dispatch' && inputs.job == 'cafe24-sync'
    runs-on: ubuntu-latest
    steps:
      - name: Cafe24 매출 자동 동기화 (최근 3일)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠ APP_URL 또는 CRON_SECRET 미설정 — 건너뜀"
            exit 0
          fi
          echo "▶ 카페24 매출 동기화 호출"
          RESPONSE=$(curl -sSL -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cafe24/sync-orders?days=3")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $CODE  Body: $BODY"
          if [ "$CODE" != "200" ]; then exit 1; fi

  birthday:
    if: >-
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * *' ||
      github.event_name == 'workflow_dispatch' && inputs.job == 'birthday'
    runs-on: ubuntu-latest
    steps:
      - name: 생일 축하 배치
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠ APP_URL 또는 CRON_SECRET 미설정 — 건너뜀"
            exit 0
          fi
          echo "▶ 생일 축하 배치 호출"
          RESPONSE=$(curl -sSL -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/notifications/batch/birthday")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $CODE  Body: $BODY"
          if [ "$CODE" != "200" ]; then exit 1; fi

  dormant:
    if: >-
      github.event_name == 'schedule' && github.event.schedule == '0 1 * * 1' ||
      github.event_name == 'workflow_dispatch' && inputs.job == 'dormant'
    runs-on: ubuntu-latest
    steps:
      - name: 휴면 재유치 배치
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠ APP_URL 또는 CRON_SECRET 미설정 — 건너뜀"
            exit 0
          fi
          echo "▶ 휴면 재유치 배치 호출"
          RESPONSE=$(curl -sSL -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/notifications/batch/dormant?days=90&limit=50")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $CODE  Body: $BODY"
          if [ "$CODE" != "200" ]; then exit 1; fi

  cafe24-refresh:
    if: >-
      github.event_name == 'schedule' && github.event.schedule == '0 17 * * *' ||
      github.event_name == 'workflow_dispatch' && inputs.job == 'cafe24-refresh'
    runs-on: ubuntu-latest
    steps:
      - name: 카페24 토큰 갱신
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠ APP_URL 또는 CRON_SECRET 미설정 — 건너뜀"
            exit 0
          fi
          echo "▶ 카페24 토큰 갱신 호출"
          RESPONSE=$(curl -sSL -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cafe24/refresh")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $CODE  Body: $BODY"
          if [ "$CODE" != "200" ]; then exit 1; fi

  campaign-scheduler:
    if: >-
      github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *' ||
      github.event_name == 'workflow_dispatch' && inputs.job == 'campaign-scheduler'
    runs-on: ubuntu-latest
    steps:
      - name: 캠페인 예약 발송 스케줄러
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠ APP_URL 또는 CRON_SECRET 미설정 — 건너뜀"
            exit 0
          fi
          echo "▶ 캠페인 스케줄러 호출"
          RESPONSE=$(curl -sSL -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/notifications/batch/campaign-scheduler")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $CODE  Body: $BODY"
          if [ "$CODE" != "200" ]; then exit 1; fi
